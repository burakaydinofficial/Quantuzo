# Custom CUDA 12.4 build with flash attention for all KV quant types
# ==================================================================
# Stacks on docker-compose.gpu.yml, overriding the official image with a custom
# build that includes GGML_CUDA_FA_ALL_QUANTS=ON (needed for q5_0, q5_1, q4_1).
#
# Usage: ./scripts/run.sh --cuda124 -m MODEL -k KV -d DATASET
#
# The image is pulled from Docker Hub if available, otherwise built locally.
# To force a local build: docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f docker-compose.gpu-cuda124.yml build llama-server
# To pull pre-built:       docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f docker-compose.gpu-cuda124.yml pull llama-server

services:
  llama-server:
    image: ${LLAMA_CUDA_IMAGE:-burakaydinofficial/llama-server-cuda124:latest}
    build:
      context: .
      dockerfile: Dockerfile.llama-server-cuda124
